name: Build
on: [push,pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.1.2'
    - run: gradle build
    - uses: actions/upload-artifact@v4
      with:
        name: ExtremeWeather
        path: build/libs/*.jar
